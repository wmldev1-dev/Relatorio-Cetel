services:
  mysql:
    image: mysql:8.4
    container_name: relatorios-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - relatorios_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: relatorios-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cetel.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_RESET_PASSWORD_ON_STARTUP: ${ADMIN_RESET_PASSWORD_ON_STARTUP:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-troque-esta-chave}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
      - backend_logs:/app/logs
      - ./database/imports:/app/database/imports:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - relatorios_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/api/health')); raise SystemExit(0 if data.get('status') == 'ok' else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: relatorios-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    command:
      [
        "streamlit",
        "run",
        "app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.runOnSave=true",
      ]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - relatorios_net

volumes:
  mysql_data:
  backend_storage:
  backend_logs:

networks:
  relatorios_net:
    driver: bridge
